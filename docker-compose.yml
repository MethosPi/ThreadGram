name: threadgram

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: threadgram
      POSTGRES_USER: threadgram
      POSTGRES_PASSWORD: threadgram
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

  api:
    build: .
    env_file:
      - .env
    environment:
      THREADGRAM_DATABASE_URL: postgresql+psycopg://threadgram:threadgram@db:5432/threadgram
    depends_on:
      - db
    ports:
      - "8000:8000"

volumes:
  postgres-data:
